<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuickQR | Desktop Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        /* Forces the layout to stay wide like a desktop screen */
        html, body {
            min-width: 1200px; 
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: auto; /* Allows horizontal scrolling if the screen is too small */
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* Top Ad Section */
        .ad-header-zone {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .main-content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px;
            gap: 40px;
        }

        .generator-card {
            width: 500px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 { font-size: 2rem; margin-bottom: 15px; color: #0f172a; }
        p { color: #64748b; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #qrcode {
            margin-top: 30px;
            padding: 15px;
            background: #fff;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="ad-header-zone">
        <script src="https://cursecrookadvantage.com/b5/7f/f6/b57ff69fcd29f684e28ccd3e70b7c3d7.js"></script>

        <div id="container-09b717bee9b5e0fb0c7c2da8c203a067"></div>
        <script async="async" data-cfasync="false" src="https://cursecrookadvantage.com/09b717bee9b5e0fb0c7c2da8c203a067/invoke.js"></script>

        <script src="https://cursecrookadvantage.com/36/2d/3f/362d3f5e394d8aba8bfc000eef0ba1f4.js"></script>

        <div>
            <script>
              atOptions = {
                'key' : 'd3abf1434ea618a03e5e2f8f1c948ce0',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
              };
            </script>
            <script src="https://cursecrookadvantage.com/d3abf1434ea618a03e5e2f8f1c948ce0/invoke.js"></script>
        </div>
    </div>

    <div class="main-content">
        <div class="generator-card">
            <h1>Desktop QR Generator</h1>
            <p>High-speed generation for professional use.</p>
            
            <input type="text" id="text-input" placeholder="Enter URL or Text" value="https://google.com">
            <button onclick="generateQR()">Generate Now</button>

            <div id="qrcode"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 QR Desktop Suite.
    </footer>

    <script>
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://google.com",
            width: 250,
            height: 250,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function generateQR() {
            const input = document.getElementById("text-input").value;
            if (input.trim() !== "") {
                qrcode.clear();
                qrcode.makeCode(input);
            }
        }
    </script>
</body>
</html>
